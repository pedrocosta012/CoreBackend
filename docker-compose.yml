name: projeto-de-teste
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: code-backend
    restart: always
    env_file:
      - .env
    ports:
      - 8081:8080
    volumes:
      - ./CoreBackend/src:/app/CoreBackend/src
      - ./CoreBackend/Properties:/app/CoreBackend/Properties
      - ./CoreBackend/appsettings.Development.json:/app/CoreBackend/appsettings.Development.json
      - ./CoreBackend/appsettings.json:/app/CoreBackend/appsettings.json
      - ./CoreBackend/CoreBackend.csproj:/app/CoreBackend/CoreBackend.csproj
      - ./CoreBackend/CoreBackend.sln:/app/CoreBackend/CoreBackend.sln
      - ./CoreBackend/Program.cs:/app/CoreBackend/Program.cs
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1G
